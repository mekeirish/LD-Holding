<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #0E1B2D; font-family: system-ui; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #root { width: 100%; display: flex; justify-content: center; align-items: center; }
    ::-webkit-scrollbar { display: none; }
    input, select, textarea { background-color: #1E2F44; color: #F0F4F8; border-color: #3A4A5F; }
    input:focus, select:focus, textarea:focus { border-color: #E8F04F; outline: none; }
    .modal-overlay { animation: fadeIn 0.25s ease-out; }
    .modal-content { animation: scaleIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ---- Toast Animations ---- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up {
      animation: slideUp 0.3s ease-out;
    }
    .toast-exit {
      animation: fadeOut 0.2s ease-in forwards;
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }
  </style>

<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <script>
    // ---- NOUVELLE CONFIGURATION FIREBASE (LD-Holding) ----
    const firebaseConfig = {
      apiKey: "AIzaSyB6uTZ4iCqNMzL-GeZq6tDgoI_sJj-ZMuo",
      authDomain: "ld-holding.firebaseapp.com",
      databaseURL: "https://ld-holding-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ld-holding",
      storageBucket: "ld-holding.firebasestorage.app",
      messagingSenderId: "671138274690",
      appId: "1:671138274690:web:3428bea30c932307bc039b",
      measurementId: "G-FB0P7E7BCN"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <script>
    const THEME = {
      colors: {
        background: '#0E1B2D', primary: '#E8F04F', secondary: '#3DC59D',
        text: '#F0F4F8', textMuted: '#9CA3AF', border: '#3A4A5F',
        cardBg: '#1A2A3F', inputBg: '#1E2F44', danger: '#EF4444', success: '#3DC59D',
      },
      borderRadius: 'rounded-2xl',
      shadow: 'shadow-xl',
    };

    const DICT = Object.freeze({
      VIEW: { DASHBOARD: 'VIEW_DASHBOARD', DETAIL: 'VIEW_DETAIL' },
      UI: { BTN_CANCEL: 'Annuler', BTN_CONFIRM: 'Confirmer' }
    });

    const { useState, useEffect, useRef } = React;

    // ---- Composants ----
    const Button = ({ onClick, children, variant = 'primary', className = '', disabled = false }) => {
      const base = "w-full py-4 font-medium rounded-2xl transition-all duration-200 active:scale-[0.98]";
      const variants = {
        primary: `bg-[${THEME.colors.primary}] text-[${THEME.colors.background}] hover:brightness-110 active:brightness-90`,
        secondary: `border-2 border-[${THEME.colors.primary}] text-[${THEME.colors.primary}] hover:bg-[${THEME.colors.primary}] hover:text-[${THEME.colors.background}] active:scale-[0.98]`,
        danger: `bg-[${THEME.colors.secondary}] text-white hover:brightness-110 active:brightness-90`
      };
      const disabledClass = disabled ? "opacity-50 cursor-not-allowed pointer-events-none" : "";
      return React.createElement("button", { onClick, disabled, className: `${base} ${variants[variant]} ${className} ${disabledClass}` }, children);
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return React.createElement("div", {
        className: `fixed inset-0 flex items-center justify-center p-4 z-50 modal-overlay bg-[${THEME.colors.background}]/80 backdrop-blur-sm`
      }, React.createElement("div", {
        className: `modal-content w-full max-w-sm p-6 rounded-2xl max-h-[80vh] overflow-y-auto border border-[${THEME.colors.border}] shadow-2xl bg-[${THEME.colors.cardBg}]`
      }, React.createElement("h2", { className: `text-[${THEME.colors.primary}] font-semibold text-lg mb-5` }, title), children));
    };

    const ImageUpload = ({ onUpload }) => {
      const handleChange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const size = 300;
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext("2d");
            const ratio = Math.max(size / img.width, size / img.height);
            const w = img.width * ratio, h = img.height * ratio;
            ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
            onUpload(canvas.toDataURL("image/jpeg", 0.9));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };
      return React.createElement("input", {
        type: "file",
        onChange: handleChange,
        className: `w-full text-sm text-[${THEME.colors.textMuted}] file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-[${THEME.colors.primary}] file:text-[${THEME.colors.background}] hover:file:brightness-110`
      });
    };

    const BrandCard = ({ brand, onClick }) =>
      React.createElement("div", { className: "flex flex-col items-center gap-2" },
        React.createElement("button", { onClick, className: `w-full aspect-square rounded-2xl overflow-hidden bg-[${THEME.colors.inputBg}] border border-[${THEME.colors.border}] transition-opacity hover:opacity-80 active:scale-[0.98]` },
          brand.image ? React.createElement("img", { src: brand.image, className: "w-full h-full object-cover" }) :
          React.createElement("span", { className: `text-[${THEME.colors.textMuted}] text-xs font-medium` }, "IMAGE")
        ),
        React.createElement("span", { className: `text-[${THEME.colors.text}] font-medium text-sm text-center` }, brand.name)
      );

    const ProductCard = ({ product, onClick, showPrices }) =>
      React.createElement("div", { className: "flex flex-col items-center gap-1 cursor-pointer", onClick },
        React.createElement("div", { className: `w-full aspect-square rounded-2xl overflow-hidden bg-[${THEME.colors.inputBg}] border border-[${THEME.colors.border}] transition-opacity hover:opacity-80 active:scale-[0.98]` },
          product.image ? React.createElement("img", { src: product.image, className: "w-full h-full object-cover" }) :
          React.createElement("span", { className: `text-[${THEME.colors.textMuted}] text-xs font-medium` }, "PROD")
        ),
        React.createElement("span", { className: `text-[${THEME.colors.text}] font-medium text-sm text-center` }, product.name),
        showPrices ? React.createElement("span", { className: `text-[${THEME.colors.secondary}] text-xs` }, "Prix: ", product.price, " DZD") : null,
        React.createElement("span", { className: `text-[${THEME.colors.textMuted}] text-xs` }, "Pack: ", product.qty, " unités")
      );

    // ---- Toast ----
    const Toast = ({ message, type, onClose }) => {
      if (!message) return null;
      const accentColors = {
        success: 'border-[#3DC59D]',
        error: 'border-rose-500',
        info: 'border-[#E8F04F]'
      };
      const icons = {
        success: '✓',
        error: '✕',
        info: 'ℹ'
      };
      const textColors = {
        success: 'text-[#3DC59D]',
        error: 'text-rose-400',
        info: 'text-[#E8F04F]'
      };
      return React.createElement("div", {
        className: `fixed bottom-20 left-1/2 -translate-x-1/2 z-[100] max-w-sm w-full p-3 rounded-lg bg-[#0E1B2D]/90 backdrop-blur-xl border border-white/5 shadow-2xl ${accentColors[type] || 'border-white/5'} border-l-4 animate-slide-up`
      }, React.createElement("div", { className: "flex items-center gap-3" },
        React.createElement("span", { className: `text-sm font-bold ${textColors[type] || 'text-white'}` }, icons[type] || 'ℹ'),
        React.createElement("div", { className: "flex-1 text-sm font-light text-white/90" }, message),
        React.createElement("button", { onClick: onClose, className: "text-white/30 hover:text-white/70 transition-colors text-sm" }, "✕")
      ));
    };

    // ---- Hachage ----
    const hashPin = async (pin) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(pin);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // ---- Composant principal ----
    const App = () => {
      // États
      const [isAdmin, setIsAdmin] = useState(false);
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinInput, setPinInput] = useState('');
      const [pinConfirm, setPinConfirm] = useState('');
      const [pinMode, setPinMode] = useState('verify');
      const [pinError, setPinError] = useState('');
      const [adminList, setAdminList] = useState([]);
      const [showManageAdmins, setShowManageAdmins] = useState(false);
      const [newAdminName, setNewAdminName] = useState('');

      const [showDeleteConfirmModal, setShowDeleteConfirmModal] = useState(false);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [deleteCode, setDeleteCode] = useState('');

      // États synchronisés avec Firebase
      const [logoUrl, setLogoUrl] = useState(() => localStorage.getItem('app_logo') || null);
      const [appTitle, setAppTitle] = useState(() => localStorage.getItem('app_title') || 'MARKET HUB');
      const [brands, setBrands] = useState([]);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);

      // État pour l'URL du logo dans le champ de saisie
      const [logoUrlInput, setLogoUrlInput] = useState('');

      // ---- Informations client pour la commande ----
      const [clientInfo, setClientInfo] = useState({ nom: '', adresse: '', telephone: '', commentaire: '' });

      // Références
      const fileInputRef = useRef(null);
      const imageInputRef = useRef(null);
      const logoInputRef = useRef(null);

      // ---- Écouteurs Firebase ----
      useEffect(() => {
        try {
          const settingsRef = firebase.database().ref('settings');
          const settingsListener = settingsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
              if (data.logo) setLogoUrl(data.logo);
              if (data.title) setAppTitle(data.title);
            }
            setLoading(false);
          });
          return () => settingsRef.off('value', settingsListener);
        } catch (err) {
          console.error('Erreur listener settings:', err);
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        try {
          const brandsRef = firebase.database().ref('brands');
          const brandsListener = brandsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
              const brandsArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
              setBrands(brandsArray);
            } else {
              setBrands([]);
            }
          });
          return () => brandsRef.off('value', brandsListener);
        } catch (err) {
          console.error('Erreur listener brands:', err);
        }
      }, []);

      useEffect(() => {
        try {
          const ordersRef = firebase.database().ref('orders');
          const ordersListener = ordersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
              const ordersArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
              setOrders(ordersArray);
            } else {
              setOrders([]);
            }
          });
          return () => ordersRef.off('value', ordersListener);
        } catch (err) {
          console.error('Erreur listener orders:', err);
        }
      }, []);

      // Sauvegarde locale
      useEffect(() => {
        if (logoUrl) localStorage.setItem('app_logo', logoUrl);
        else localStorage.removeItem('app_logo');
      }, [logoUrl]);

      useEffect(() => {
        localStorage.setItem('app_title', appTitle);
      }, [appTitle]);

      const [showPrices, setShowPrices] = useState(() => {
        const saved = localStorage.getItem('show_prices');
        return saved !== null ? JSON.parse(saved) : true;
      });
      const [currentView, setCurrentView] = useState(DICT.VIEW.DASHBOARD);
      const [selectedBrand, setSelectedBrand] = useState(null);
      const [isTransitioning, setIsTransitioning] = useState(false);

      const [toast, setToast] = useState({ message: '', type: 'info', visible: false });
      const toastTimeout = useRef(null);
      const showToast = (message, type = 'info') => {
        if (toastTimeout.current) clearTimeout(toastTimeout.current);
        setToast({ message, type, visible: true });
        toastTimeout.current = setTimeout(() => {
          setToast({ message: '', type: 'info', visible: false });
        }, 4000);
      };
      const hideToast = () => {
        if (toastTimeout.current) clearTimeout(toastTimeout.current);
        setToast({ message: '', type: 'info', visible: false });
      };

      const [modals, setModals] = useState({
        brand: false, product: false, brandSelect: false, manage: false,
        imgbb: false, productDetail: false, cart: false, orders: false, notifications: false,
        advancedOptions: false
      });
      const [editingProduct, setEditingProduct] = useState(null);
      const [manageSelectedBrand, setManageSelectedBrand] = useState(null);
      const [showDataPanel, setShowDataPanel] = useState(false);
      const [selectedBrandForData, setSelectedBrandForData] = useState('');
      const [editingBrandId, setEditingBrandId] = useState(null);
      const [editingBrandName, setEditingBrandName] = useState('');
      const [editingBrandImage, setEditingBrandImage] = useState(null);
      const [confirmDeleteBrandId, setConfirmDeleteBrandId] = useState(null);
      const [confirmDeleteProduct, setConfirmDeleteProduct] = useState(null);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [productQuantity, setProductQuantity] = useState(1);
      const [orderTab, setOrderTab] = useState('received');

      const [cart, setCart] = useState(() => {
        const saved = localStorage.getItem('cart');
        return saved ? JSON.parse(saved) : [];
      });
      useEffect(() => localStorage.setItem('cart', JSON.stringify(cart)), [cart]);

      const [imgbbApiKey, setImgbbApiKey] = useState(() => localStorage.getItem('imgbb_api_key') || '');
      useEffect(() => localStorage.setItem('imgbb_api_key', imgbbApiKey), [imgbbApiKey]);

      const [ntfyTopic, setNtfyTopic] = useState(() => localStorage.getItem('ntfy_topic') || 'ldholdingnotif');
      useEffect(() => localStorage.setItem('ntfy_topic', ntfyTopic), [ntfyTopic]);

      // ---- Fonctions Firebase (admins) ----
      const fetchAdmins = async () => {
        try {
          const snapshot = await firebase.database().ref('admins').once('value');
          const data = snapshot.val();
          if (data && Array.isArray(data)) {
            const valid = data.filter(item => item && typeof item === 'object' && item.name && item.hash);
            return valid;
          }
          return [];
        } catch (err) {
          console.error('Erreur chargement admins:', err);
          return [];
        }
      };

      const addAdminPin = async (pin, name = 'MEKEIRISHDEV') => {
        const hash = await hashPin(pin);
        const current = await fetchAdmins();
        if (current.some(a => a.hash === hash)) {
          throw new Error('Ce code PIN existe déjà.');
        }
        const newList = [...current, { name, hash }];
        await firebase.database().ref('admins').set(newList);
        return { name, hash };
      };

      const removeAdminPin = async (hash) => {
        const current = await fetchAdmins();
        const newList = current.filter(a => a.hash !== hash);
        await firebase.database().ref('admins').set(newList);
      };

      // ---- Gestion logo ----
      const uploadToImgbb = async (dataUrl) => {
        if (!imgbbApiKey) throw new Error('Clé API imgbb manquante');
        let base64 = dataUrl;
        if (dataUrl.startsWith('data:')) base64 = dataUrl.split(',')[1];
        const formData = new FormData();
        formData.append('key', imgbbApiKey);
        formData.append('image', base64);
        const response = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        const json = await response.json();
        if (!json.success) throw new Error(json.error?.message || 'Erreur upload imgbb');
        return json.data.url;
      };

      const handleFormImageUpload = (setter, state) => async (dataUrl) => {
        try {
          const url = await uploadToImgbb(dataUrl);
          setter({ ...state, image: url });
          showToast('Image uploadée avec succès.', 'success');
        } catch (err) {
          console.error(err);
          showToast('Erreur upload image: ' + err.message, 'error');
        }
      };

      // Upload par fichier (inchangé)
      const handleLogoUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const maxWidth = 200;
                const canvas = document.createElement("canvas");
                let width = img.width, height = img.height;
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL("image/png"));
              };
              img.onerror = () => reject(new Error("Erreur chargement image"));
              img.src = event.target.result;
            };
            reader.onerror = () => reject(new Error("Erreur lecture fichier"));
            reader.readAsDataURL(file);
          });

          setLogoUrl(dataUrl);
          showToast('Logo mis à jour localement.', 'success');

          let finalUrl = dataUrl;
          if (imgbbApiKey) {
            try {
              const url = await uploadToImgbb(dataUrl);
              finalUrl = url;
              showToast('Logo uploadé sur imgbb.', 'success');
            } catch (uploadErr) {
              console.error('Upload imgbb échoué, reste en local:', uploadErr);
              showToast('Logo stocké localement (upload imgbb échoué).', 'error');
            }
          } else {
            showToast('Aucune clé API imgbb, logo stocké localement.', 'info');
          }
          await firebase.database().ref('settings').update({ logo: finalUrl });
        } catch (err) {
          console.error(err);
          showToast('Erreur lors du traitement de l\'image: ' + err.message, 'error');
        }
        e.target.value = '';
      };

      // Nouvelle fonction : appliquer une URL de logo directement
      const handleLogoUrlSubmit = async () => {
        const url = logoUrlInput.trim();
        if (!url) {
          showToast('Veuillez entrer une URL valide.', 'error');
          return;
        }
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          showToast('L\'URL doit commencer par http:// ou https://', 'error');
          return;
        }
        try {
          setLogoUrl(url);
          await firebase.database().ref('settings').update({ logo: url });
          setLogoUrlInput('');
          showToast('Logo mis à jour avec succès.', 'success');
        } catch (err) {
          console.error(err);
          showToast('Erreur lors de la mise à jour du logo: ' + err.message, 'error');
        }
      };

      const handleTitleChange = async () => {
        const newTitle = prompt('Entrez le nouveau titre :', appTitle);
        if (newTitle !== null && newTitle.trim() !== '') {
          const title = newTitle.trim();
          setAppTitle(title);
          await firebase.database().ref('settings').update({ title });
          showToast('Titre mis à jour.', 'success');
        } else if (newTitle !== null && newTitle.trim() === '') {
          showToast('Le titre ne peut pas être vide.', 'error');
        }
      };

      // ---- Gestion PIN ----
      const openPinModal = async (mode = 'verify') => {
        try {
          const admins = await fetchAdmins();
          setAdminList(admins);
          if (admins.length === 0 && mode === 'verify') {
            setPinMode('create');
          } else {
            setPinMode(mode);
          }
          setPinInput('');
          setPinConfirm('');
          setPinError('');
          setShowPinModal(true);
        } catch (err) {
          console.error('Erreur openPinModal:', err);
          showToast('Erreur lors de la vérification du PIN.', 'error');
        }
      };

      const handlePinSubmit = async () => {
        const admins = await fetchAdmins();
        setAdminList(admins);
        if (pinMode === 'verify') {
          if (admins.length === 0) {
            setPinMode('create');
            setPinError('Aucun admin existant. Veuillez créer le premier code PIN.');
            return;
          }
          const inputHash = await hashPin(pinInput);
          if (admins.some(a => a.hash === inputHash)) {
            setIsAdmin(true);
            setCurrentView(DICT.VIEW.DASHBOARD);
            setSelectedBrand(null);
            setShowPinModal(false);
            setPinInput('');
            showToast('Mode administrateur activé.', 'success');
          } else {
            setPinError('Code PIN incorrect.');
          }
        } else if (pinMode === 'create') {
          if (pinInput.length < 8) {
            setPinError('Le PIN doit comporter au moins 8 chiffres.');
            return;
          }
          if (pinInput !== pinConfirm) {
            setPinError('Les PINs ne correspondent pas.');
            return;
          }
          try {
            await addAdminPin(pinInput, 'MEKEIRISHDEV');
            setIsAdmin(true);
            setCurrentView(DICT.VIEW.DASHBOARD);
            setSelectedBrand(null);
            setShowPinModal(false);
            setPinInput('');
            setPinConfirm('');
            showToast('Premier admin créé (MEKEIRISHDEV).', 'success');
          } catch (err) {
            setPinError(err.message);
          }
        }
      };

      const toggleAdmin = () => {
        if (isAdmin) {
          setIsAdmin(false);
          showToast('Mode administrateur désactivé.', 'info');
        } else {
          openPinModal('verify');
        }
      };

      const openManageAdmins = () => {
        fetchAdmins().then(setAdminList);
        setShowManageAdmins(true);
        setModals(prev => ({ ...prev, advancedOptions: false }));
      };

      // ---- Suppression admin sécurisée ----
      const handleRemoveAdmin = (hash, name) => {
        setDeleteTarget({ hash, name });
        setDeleteCode('');
        setShowDeleteConfirmModal(true);
      };

      const confirmDeleteAdmin = async () => {
        if (deleteCode === '1747') {
          await removeAdminPin(deleteTarget.hash);
          showToast(`${deleteTarget.name} supprimé.`, 'info');
          const admins = await fetchAdmins();
          if (admins.length === 0) setIsAdmin(false);
          setShowDeleteConfirmModal(false);
          setDeleteTarget(null);
          setDeleteCode('');
        } else {
          showToast('Code incorrect, suppression annulée.', 'error');
          setShowDeleteConfirmModal(false);
          setDeleteTarget(null);
          setDeleteCode('');
        }
      };

      // ---- CRUD Marques (Firebase) ----
      const [newBrand, setNewBrand] = useState({ name: "", image: null });
      const addBrand = async () => {
        if (!newBrand.name) { showToast("Veuillez entrer un nom de marque.", "error"); return; }
        const brandData = { ...newBrand, products: [] };
